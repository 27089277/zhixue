server:
  port: 8080

spring:
  application:
    name: zhixue-server
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/zhixue?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 210MB

# 媒体对象存储（讲解视频等大文件：存磁盘，不进关系库；DB 只存引用 URL）
media:
  dir: ${MEDIA_DIR:./data/media}

# DeepSeek 配置（与原 FastAPI 后端一致，从环境变量读取）
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:90}
